name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar NDK e CMake
        run: |
          echo "y" | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;29.0.14206865" "cmake;3.30.3"

      - name: Cache do vcpkg (acelera builds futuros)
        uses: actions/cache@v4
        with:
          path: |
            dependencies/vcpkg/downloads
            dependencies/vcpkg/packages
            dependencies/vcpkg/buildtrees
          key: vcpkg-android-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-android-

      - name: Dar permissão de execução ao gradlew
        run: chmod +x src/android/gradlew

      - name: Compilar APK (Debug)
        working-directory: src/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Encontrar APK gerado
        id: find_apk
        run: |
          APK_PATH=$(find src/android/app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload do APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: cemu-android-debug
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
